name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create module archive
        run: zip -r module.zip . -x ".git/*" ".github/*" "*.zip"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            module.zip
